<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- =============== STYLE =============== -->
    <link rel="stylesheet" href="css/index.css">
    <!-- =============== ICON DE URL =============== -->
    <link rel="shortcut icon" href="img/icon.png" type="image/x-icon">
    <!-- =============== ICON =============== -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet"/>
    <title>SustentAgro</title>
</head>
<body>
    <!-- =============== HEADER =============== -->
    <header class="header" id="header">
        <nav class="nav container">
            <a href="index.html" class="nav--logo">
                Sustent<span>Agro</span>
            </a>
            <div class="nav--menu" id="nav-menu">
                <ul class="nav--list">
                    <li class="nav--item">
                        <a href="#" class="nav--link">
                            <i class="ri-arrow-right-line"></i>
                            <span>Início</span>
                        </a>
                    </li>
                    <li class="nav--item">
                        <a href="#" class="nav--link">
                            <i class="ri-arrow-right-line"></i>
                            <span>Sobre</span>
                        </a>
                    </li>
                    <li class="nav--item">
                        <a href="#" class="nav--link">
                            <i class="ri-arrow-right-line"></i>
                            <span>Lista de ONGs</span>
                        </a>
                    </li>
                </ul>
                <!-- Close Button -->
                <div class="nav--close" id="nav-close">
                    <i class="ri-close-large-line"></i>
                </div>
                
            </div>
            <!-- Toggle Button -->
            <div class="nav--toggle" id="nav-toggle">
                <i class="ri-menu-line"></i>
            </div>
        </nav>
    </header>

    <!-- =============== MAIN =============== -->
    <main>
        <style> /*temporario*/
                body {
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: linear-gradient(135deg, #3d830e, #1e293b);
                color: #fff;
                }

                .container-temporario {
                text-align: center;
                padding: 40px 60px;
                border-radius: 16px;
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
                animation: fadeIn 1.2s ease-in-out;
                }

               .container-temporario h1 {
                font-size: 2.5rem;
                font-weight: 600;
                color: #22c55e; /* verde sustentável */
                margin-bottom: 10px;
                letter-spacing: 1px;
                }

                .container-temporario p {
                font-size: 1.8rem;
                font-weight: 500;
                color: #e2e8f0;
                }

                /* animação suave */
                @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
                }
        </style>
        <div class="container-temporario">
            <h1>Em breve</h1>
            <div class="line"></div>
            <p>SustetAgro</p>
        </div>
    </main>

    <!-- =============== MAIN JS =============== -->
    <script src="js/mainIndex.js"></script>
</body>
</html>
